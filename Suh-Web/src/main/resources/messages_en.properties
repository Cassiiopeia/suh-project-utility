dashboard.about.p1=Hi! I'm Saechan Suh, a backend developer who enjoys building experimental features and solving problems.
dashboard.about.p2=I majored in Integrative Bioscience and Biotechnology at Sejong University, gaining a deep understanding of life sciences. Later, I dove into the world of development through the Zerobase Bootcamp. Currently, I'm working at SOMANSA, contributing to DLP solution development as a Server Module Team Researcher.
