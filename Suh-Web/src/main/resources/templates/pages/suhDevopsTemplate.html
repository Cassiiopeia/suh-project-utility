<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(title='SUH DevOps Template - SAECHAN-LAB')}"></head>
<body class="min-h-screen">
<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <section class="hero bg-base-200 rounded-2xl mb-6">
    <div class="hero-content text-center py-10">
      <div class="max-w-2xl">
        <div class="flex justify-center gap-2 mb-4 flex-wrap">
          <span class="badge badge-warning">v2.9.9</span>
          <span class="badge badge-ghost">GitHub Actions</span>
          <span class="badge badge-ghost">9 Project Types</span>
          <span class="badge badge-ghost">20 AI Skills</span>
        </div>
        <h1 class="text-3xl sm:text-4xl font-bold mb-3 flex items-center justify-center gap-3">
          <i class="fa-solid fa-rocket text-warning"></i>
          SUH-DEVOPS-TEMPLATE
        </h1>
        <p class="text-base-content/70 text-sm sm:text-base mb-5">
          완전 자동화된 GitHub 프로젝트 관리 템플릿 — 버전 관리, AI 체인지로그, CI/CD, AI 스킬을 한 번에
        </p>
        <a href="https://github.com/Cassiiopeia/SUH-DEVOPS-TEMPLATE" target="_blank"
           class="btn btn-sm btn-neutral">
          <i class="fa-brands fa-github"></i>
          GitHub
        </a>
      </div>
    </div>
  </section>

  <div role="tablist" class="tabs tabs-lift mb-6" id="mainTabs">
    <a role="tab" class="tab" data-tab="overview"><i class="fa-solid fa-star mr-1"></i> 개요</a>
    <a role="tab" class="tab" data-tab="apply"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i> 적용</a>
    <a role="tab" class="tab" data-tab="commands"><i class="fa-solid fa-comment mr-1"></i> 명령어</a>
    <a role="tab" class="tab" data-tab="wizards"><i class="fa-solid fa-hat-wizard mr-1"></i> 마법사</a>
    <a role="tab" class="tab" data-tab="workflows"><i class="fa-solid fa-diagram-project mr-1"></i> 워크플로우</a>
    <a role="tab" class="tab" data-tab="skills"><i class="fa-solid fa-robot mr-1"></i> AI 스킬</a>
    <a role="tab" class="tab" data-tab="settings"><i class="fa-solid fa-gear mr-1"></i> 설정</a>
  </div>

  <section id="panel-overview" class="devops-panel"></section>
  <section id="panel-apply" class="devops-panel hide"></section>
  <section id="panel-commands" class="devops-panel hide"></section>
  <section id="panel-wizards" class="devops-panel hide"></section>
  <section id="panel-workflows" class="devops-panel hide"></section>
  <section id="panel-skills" class="devops-panel hide"></section>
  <section id="panel-settings" class="devops-panel hide"></section>

</main>

<dialog id="featureModal" class="modal">
  <div class="modal-box max-w-2xl">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <div id="modalHeader" class="flex items-center gap-3 mb-4"></div>
    <div id="modalContent" class="space-y-4"></div>
    <div class="modal-action">
      <a id="modalDocLink" href="#" target="_blank" class="btn btn-outline btn-sm">
        <i class="fa-solid fa-book"></i> 상세 문서 보기
      </a>
      <form method="dialog">
        <button class="btn">닫기</button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<div th:replace="~{fragments/footer :: footer}"></div>

  const VALID_TABS = ['overview','apply','commands','wizards','workflows','skills','settings'];

  function resolveInitialTab() {
    const hash = (location.hash || '').replace('#','');
    const stored = localStorage.getItem('devopsTab');
    if (VALID_TABS.includes(hash)) return hash;
    if (VALID_TABS.includes(stored)) return stored;
    return 'overview';
  }

  let currentTab = resolveInitialTab();
  let currentType = localStorage.getItem('devopsType') || 'spring';

  function escapeHtml(t) {
    const div = document.createElement('div');
    div.textContent = t;
    return div.innerHTML;
  }

  function copyText(text, label) {
    navigator.clipboard.writeText(text).then(() => {
      showToast((label || '명령어') + '가 복사되었습니다!', 'positive');
    }).catch(() => {
      showToast('복사에 실패했습니다.', 'negative');
    });
  }

  function typeFilterSelectHtml() {
    const options = projectTypes.map(t =>
      `<option value="${escapeHtml(t.id)}"${t.id === currentType ? ' selected' : ''}>${escapeHtml(t.label)}</option>`
    ).join('');
    return `
      <label class="form-control mb-4 block">
        <span class="label-text text-sm text-base-content/70 mb-1 block">프로젝트 타입 선택</span>
        <select class="select select-bordered select-sm devops-type-select">${options}</select>
      </label>`;
  }

  function bindTypeSelects(scope) {
    scope.querySelectorAll('.devops-type-select').forEach(sel => {
      sel.addEventListener('change', function(e) { setType(e.target.value); });
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    localStorage.setItem('devopsTab', tab);
    history.replaceState(null, '', '#' + tab);

    document.querySelectorAll('#mainTabs .tab').forEach(t => {
      t.classList.toggle('tab-active', t.dataset.tab === tab);
    });
    document.querySelectorAll('.devops-panel').forEach(p => p.classList.add('hide'));
    document.getElementById('panel-' + tab).classList.remove('hide');

    renderTab(tab);
  }

  function setType(type) {
    currentType = type;
    localStorage.setItem('devopsType', type);
    if (['commands','wizards','workflows'].includes(currentTab)) {
      renderTab(currentTab);
    }
  }

  function renderTab(tab) {
    const el = document.getElementById('panel-' + tab);
    const dynamic = ['commands','wizards','workflows'].includes(tab);
    if (!dynamic && el.dataset.rendered === 'true') return;

    switch (tab) {
      case 'overview':  renderOverview(el);  break;
      case 'apply':     renderApply(el);     break;
      case 'commands':  renderCommands(el);  break;
      case 'wizards':   renderWizards(el);   break;
      case 'workflows': renderWorkflows(el); break;
      case 'skills':    renderSkills(el);    break;
      case 'settings':  renderSettings(el);  break;
    }
    el.dataset.rendered = 'true';
  }

  function renderOverview(el) {
    const cards = Object.keys(featureDetails).map(key => {
      const f = featureDetails[key];
      return `
        <div class="card bg-base-100 shadow cursor-pointer" onclick="openFeatureModal('${key}')">
          <div class="card-body p-4">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-lg ${f.bgColor} flex items-center justify-center">
                <i class="fa-solid ${f.icon} text-base-100"></i>
              </div>
              <h3 class="font-bold">${escapeHtml(f.title)}</h3>
            </div>
            <p class="text-sm text-base-content/70">${escapeHtml(f.description)}</p>
            <div class="text-right mt-2">
              <span class="text-xs text-base-content/70">클릭하여 자세히 보기 →</span>
            </div>
          </div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-star text-warning"></i> 핵심 기능
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${cards}</div>`;
  }

  function renderApply(el) {
    el.innerHTML = `
      <div class="alert alert-info mb-4">
        <i class="fa-solid fa-circle-info"></i>
        <span>새 프로젝트는 GitHub에서 <strong>"Use this template"</strong>을 누르면 1분 내 자동 초기화됩니다. 기존 프로젝트는 아래 통합 스크립트를 실행하세요.</span>
      </div>
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="card-title text-lg mb-2">
            <i class="fa-solid fa-wand-magic-sparkles text-warning"></i> 기존 프로젝트에 적용하기
          </h2>
          <fieldset class="mb-4">
            <legend class="text-sm font-medium text-base-content/70 mb-2">운영체제 선택</legend>
            <div class="flex gap-4 flex-wrap">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="applyOs" value="unix" class="radio radio-primary" checked/>
                <span>macOS / Linux</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="applyOs" value="windows" class="radio radio-primary"/>
                <span>Windows (PowerShell)</span>
              </label>
            </div>
          </fieldset>

          <div id="applyUnixBox">
            <div class="mockup-code text-sm mb-2">
              <pre data-prefix="$"><code>${escapeHtml(integratorCommand.unix)}</code></pre>
            </div>
            <button class="btn btn-primary btn-sm" id="applyCopyUnix">
              <i class="fa-regular fa-copy"></i> 복사
            </button>
          </div>

          <div id="applyWindowsBox" class="hide">
            <div class="mockup-code text-sm mb-2">
              <pre data-prefix="PS>"><code>${escapeHtml(integratorCommand.windows)}</code></pre>
            </div>
            <button class="btn btn-primary btn-sm" id="applyCopyWindows">
              <i class="fa-regular fa-copy"></i> 복사
            </button>
          </div>

          <p class="text-xs text-base-content/70 mt-3">대화형 모드로 프로젝트 타입과 버전을 자동 감지합니다.</p>
        </div>
      </div>`;

    const unixBox = el.querySelector('#applyUnixBox');
    const winBox = el.querySelector('#applyWindowsBox');
    el.querySelectorAll('input[name="applyOs"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const isUnix = this.value === 'unix';
        unixBox.classList.toggle('hide', !isUnix);
        winBox.classList.toggle('hide', isUnix);
      });
    });
    el.querySelector('#applyCopyUnix').addEventListener('click', () => copyText(integratorCommand.unix, '명령어'));
    el.querySelector('#applyCopyWindows').addEventListener('click', () => copyText(integratorCommand.windows, '명령어'));
  }

  function renderCommands(el) {
    const filtered = commentCommands.filter(c => c.types.includes(currentType));
    const list = filtered.length
      ? filtered.map(c => `
        <div class="card bg-base-100 shadow">
          <div class="card-body p-4 flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <i class="fa-solid ${c.icon} text-base-content/70 w-5 text-center"></i>
              <div>
                <code class="text-sm">${escapeHtml(c.cmd)}</code>
                <p class="text-xs text-base-content/70 mt-1">${escapeHtml(c.desc)}</p>
              </div>
            </div>
            <button class="btn btn-ghost btn-xs devops-copy-cmd" data-cmd="${escapeHtml(c.cmd)}">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
        </div>`).join('')
      : `<div class="alert"><span>선택한 프로젝트 타입에는 사용 가능한 댓글 명령어가 없습니다.</span></div>`;

    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-comment text-info"></i> 댓글 명령어
        <span class="badge badge-info badge-sm">Issue/PR</span>
      </h2>
      ${typeFilterSelectHtml()}
      <div class="grid grid-cols-1 gap-3">${list}</div>`;

    el.querySelectorAll('.devops-copy-cmd').forEach(btn => {
      btn.addEventListener('click', () => copyText(btn.dataset.cmd, '명령어'));
    });
    bindTypeSelects(el);
  }

  function renderWizards(el) {
    const filtered = wizards.filter(w => w.types.includes(currentType));
    const list = filtered.length
      ? filtered.map(w => {
          const previewLink = w.html
            ? `<a href="${escapeHtml(PREVIEW_BASE + w.html)}" target="_blank" class="btn btn-primary btn-sm">
                 <i class="fa-solid fa-up-right-from-square"></i> 마법사 열기
               </a>`
            : '';
          return `
            <div class="card bg-base-100 shadow">
              <div class="card-body p-4">
                <div class="flex items-center gap-3 mb-2">
                  <div class="w-10 h-10 rounded-lg bg-base-200 flex items-center justify-center">
                    <i class="fa-solid ${w.icon} text-base-content"></i>
                  </div>
                  <h3 class="font-bold">${escapeHtml(w.name)}</h3>
                </div>
                <p class="text-sm text-base-content/70 mb-3">${escapeHtml(w.desc)}</p>
                <div class="flex flex-wrap gap-2">
                  ${previewLink}
                  <a href="${escapeHtml(REPO_BASE + w.doc)}" target="_blank" class="btn btn-outline btn-sm">
                    <i class="fa-solid fa-book"></i> 가이드 문서
                  </a>
                </div>
              </div>
            </div>`;
        }).join('')
      : `<div class="alert"><span>선택한 프로젝트 타입에는 사용 가능한 마법사가 없습니다.</span></div>`;

    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-hat-wizard text-warning"></i> 설정 마법사
      </h2>
      ${typeFilterSelectHtml()}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${list}</div>`;

    bindTypeSelects(el);
  }

  function renderWorkflows(el) {
    const commonRows = commonWorkflows.map(w => `
      <tr>
        <td>${escapeHtml(w.name)}</td>
        <td><code class="text-xs">${escapeHtml(w.wf)}</code></td>
        <td class="text-base-content/70">${escapeHtml(w.desc)}</td>
      </tr>`).join('');

    const typeFiltered = typeWorkflows.filter(w => w.types.includes(currentType));
    const typeRows = typeFiltered.length
      ? typeFiltered.map(w => `
        <tr>
          <td>${escapeHtml(w.name)}</td>
          <td><code class="text-xs">${escapeHtml(w.wf)}</code></td>
          <td class="text-base-content/70">${escapeHtml(w.desc)}</td>
        </tr>`).join('')
      : `<tr><td colspan="3" class="text-base-content/70">선택한 프로젝트 타입 전용 워크플로우가 없습니다.</td></tr>`;

    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-diagram-project text-success"></i> GitHub Actions 워크플로우
      </h2>
      ${typeFilterSelectHtml()}
      <h3 class="font-bold mb-2 mt-2">공통 워크플로우</h3>
      <div class="overflow-x-auto mb-6">
        <table class="table table-zebra w-full text-sm">
          <thead><tr><th>이름</th><th>워크플로우 파일</th><th>설명</th></tr></thead>
          <tbody>${commonRows}</tbody>
        </table>
      </div>
      <h3 class="font-bold mb-2">타입별 워크플로우</h3>
      <div class="overflow-x-auto">
        <table class="table table-zebra w-full text-sm">
          <thead><tr><th>이름</th><th>워크플로우 파일</th><th>설명</th></tr></thead>
          <tbody>${typeRows}</tbody>
        </table>
      </div>`;

    bindTypeSelects(el);
  }

  function renderSkills(el) {
    const platforms = [
      { key:'claude', label:'Claude Code', icon:'fa-robot' },
      { key:'cursor', label:'Cursor', icon:'fa-i-cursor' },
      { key:'gemini', label:'Gemini CLI', icon:'fa-gem' },
      { key:'codex', label:'Codex', icon:'fa-terminal' }
    ];
    const platformCards = platforms.map(p => {
      const lines = installCommands[p.key].split('\n')
        .map(line => `<pre data-prefix="$"><code>${escapeHtml(line)}</code></pre>`).join('');
      return `
        <div class="card bg-base-100 shadow">
          <div class="card-body p-4">
            <div class="flex items-center justify-between mb-2">
              <h3 class="font-bold flex items-center gap-2">
                <i class="fa-solid ${p.icon} text-base-content/70"></i> ${escapeHtml(p.label)}
              </h3>
              <button class="btn btn-ghost btn-xs devops-copy-install" data-key="${p.key}">
                <i class="fa-regular fa-copy"></i> 복사
              </button>
            </div>
            <div class="mockup-code text-sm">${lines}</div>
          </div>
        </div>`;
    }).join('');

    const skillRows = skills.map(s => `
      <tr>
        <td><code class="text-xs">${escapeHtml(s.cmd)}</code></td>
        <td class="text-base-content/70">${escapeHtml(s.desc)}</td>
      </tr>`).join('');

    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-robot text-secondary"></i> AI 스킬
      </h2>
      <h3 class="font-bold mb-2">플랫폼별 설치</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">${platformCards}</div>
      <h3 class="font-bold mb-2">스킬 목록 (20종)</h3>
      <div class="overflow-x-auto">
        <table class="table table-zebra w-full text-sm">
          <thead><tr><th>스킬</th><th>설명</th></tr></thead>
          <tbody>${skillRows}</tbody>
        </table>
      </div>`;

    el.querySelectorAll('.devops-copy-install').forEach(btn => {
      btn.addEventListener('click', () => copyText(installCommands[btn.dataset.key], '설치 명령어'));
    });
  }

  function renderSettings(el) {
    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fa-solid fa-gear text-base-content"></i> 필수 설정
      </h2>
      <div class="alert alert-info mb-4">
        <i class="fa-solid fa-circle-info"></i>
        <span>자동 체인지로그, PR 자동 머지 등을 사용하려면 아래 설정이 필요합니다.</span>
      </div>

      <div class="card bg-base-100 shadow mb-6">
        <div class="card-body">
          <h3 class="font-bold mb-2">
            <i class="fa-solid fa-key text-warning"></i> _GITHUB_PAT_TOKEN 등록
          </h3>
          <p class="text-sm text-base-content/70 mb-3">
            Repository <strong>Settings → Secrets and variables → Actions → New repository secret</strong>
          </p>
          <div class="mockup-code text-sm">
            <pre data-prefix="1"><code>Name : _GITHUB_PAT_TOKEN</code></pre>
            <pre data-prefix="2"><code>Value: [Personal Access Token - repo, workflow 권한]</code></pre>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h3 class="font-bold mb-2">
            <i class="fa-solid fa-building text-base-content/70"></i> Organization 설정 (필요 시)
          </h3>
          <div class="alert alert-warning mb-3">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Organization 레포라면 Actions 권한을 추가로 열어야 PR 자동 생성/머지가 동작합니다.</span>
          </div>
          <p class="text-sm text-base-content/70 mb-2">Settings → Actions → General</p>
          <ul class="list-disc list-inside space-y-1 text-sm text-base-content">
            <li>Allow GitHub Actions to create and approve pull requests 체크</li>
            <li>Workflow permissions: Read and write permissions 선택</li>
          </ul>
        </div>
      </div>`;
  }

  function openFeatureModal(key) {
    const f = featureDetails[key];
    document.getElementById('modalHeader').innerHTML = `
      <div class="w-12 h-12 rounded-lg ${f.bgColor} flex items-center justify-center">
        <i class="fa-solid ${f.icon} text-base-100 text-xl"></i>
      </div>
      <h3 class="font-bold text-xl">${escapeHtml(f.title)}</h3>`;
    document.getElementById('modalContent').innerHTML = `
      <p class="text-base-content/70">${escapeHtml(f.description)}</p>
      <ul class="list-disc list-inside space-y-2 text-sm text-base-content">
        ${f.details.map(d => `<li>${escapeHtml(d)}</li>`).join('')}
      </ul>`;
    document.getElementById('modalDocLink').href = f.docLink;
    document.getElementById('featureModal').showModal();
  }

  $(document).ready(function() {
    document.querySelectorAll('#mainTabs .tab').forEach(tab => {
      tab.addEventListener('click', function(e) {
        e.preventDefault();
        switchTab(this.dataset.tab);
      });
    });
    switchTab(currentTab);
  });
</script>
</body>
</html>
