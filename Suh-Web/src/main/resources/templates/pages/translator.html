<!-- src/main/resources/templates/pages/translator.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(title='번역기-SAECHAN-LAB')}"></head>
<body class="translator-page bg-base-200">
<div th:replace="~{fragments/header :: header}"></div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- 페이지 헤더 -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-base-content flex items-center gap-2">
      <i class="fa-solid fa-language text-primary"></i>
      SUH-AI 번역기
    </h2>
  </div>

  <!-- 번역 영역 -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
    <!-- 원본 텍스트 영역 -->
    <div class="card bg-base-100 shadow-sm border border-base-300">
      <div class="card-body">
        <!-- 원본 언어 선택 -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">원본 언어</span>
          </label>
          <select id="sourceLanguage" class="select w-full">
            <option value="AUTO" selected>🌐 언어 감지</option>
            <option value="KO">🇰🇷 한국어</option>
            <option value="EN">🇺🇸 영어</option>
            <option value="JA">🇯🇵 일본어</option>
            <option value="ZH_CN">🇨🇳 중국어 (간체)</option>
            <option value="ZH_TW">🇹🇼 중국어 (번체)</option>
            <option value="ES">🇪🇸 스페인어</option>
            <option value="FR">🇫🇷 프랑스어</option>
            <option value="DE">🇩🇪 독일어</option>
            <option value="RU">🇷🇺 러시아어</option>
            <option value="PT">🇵🇹 포르투갈어</option>
            <option value="IT">🇮🇹 이탈리아어</option>
            <option value="VI">🇻🇳 베트남어</option>
            <option value="TH">🇹🇭 태국어</option>
            <option value="ID">🇮🇩 인도네시아어</option>
          </select>
        </div>

        <!-- 원본 텍스트 입력 -->
        <div class="form-control mt-4">
          <textarea
            id="sourceText"
            class="textarea h-48 resize-none"
            placeholder="번역할 텍스트를 입력하세요..."></textarea>
          <label class="label">
            <span class="label-text-alt text-base-content/70">
              <span id="charCount">0</span> 글자
            </span>
          </label>
        </div>
      </div>
    </div>

    <!-- 번역 결과 영역 -->
    <div class="card bg-base-100 shadow-sm border border-base-300">
      <div class="card-body">
        <!-- 대상 언어 선택 -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">대상 언어</span>
          </label>
          <select id="targetLanguage" class="select w-full">
            <option value="KO" selected>🇰🇷 한국어</option>
            <option value="EN">🇺🇸 영어</option>
            <option value="JA">🇯🇵 일본어</option>
            <option value="ZH_CN">🇨🇳 중국어 (간체)</option>
            <option value="ZH_TW">🇹🇼 중국어 (번체)</option>
            <option value="ES">🇪🇸 스페인어</option>
            <option value="FR">🇫🇷 프랑스어</option>
            <option value="DE">🇩🇪 독일어</option>
            <option value="RU">🇷🇺 러시아어</option>
            <option value="PT">🇵🇹 포르투갈어</option>
            <option value="IT">🇮🇹 이탈리아어</option>
            <option value="VI">🇻🇳 베트남어</option>
            <option value="TH">🇹🇭 태국어</option>
            <option value="ID">🇮🇩 인도네시아어</option>
          </select>
        </div>

        <!-- 번역 결과 -->
        <div class="form-control mt-4">
          <div id="targetText" class="bg-base-200 border border-base-300 rounded-lg p-4 h-48 overflow-y-auto text-base-content">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 버튼 영역 -->
  <div class="flex justify-center gap-4 mt-6">
    <button id="translateBtn" class="btn btn-primary">
      <i class="fa-solid fa-language"></i>
      번역하기
    </button>
    <button id="copyBtn" class="btn btn-outline">
      <i class="fa-solid fa-copy"></i>
      복사하기
    </button>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  $(document).ready(function () {
    initElements();
    setupEventHandlers();
  });

  function initElements() {
    window.elements = {
      sourceText: document.getElementById('sourceText'),
      targetText: document.getElementById('targetText'),
      translateBtn: document.getElementById('translateBtn'),
      copyBtn: document.getElementById('copyBtn'),
      sourceLanguage: document.getElementById('sourceLanguage'),
      targetLanguage: document.getElementById('targetLanguage'),
      charCount: document.getElementById('charCount')
    };
    updateTranslationPlaceholder();
  }

  function setupEventHandlers() {
    window.elements.translateBtn.addEventListener('click', translateText);
    window.elements.copyBtn.addEventListener('click', copyTranslatedText);
    window.elements.sourceText.addEventListener('input', debounce(function() {
      updateCharCount();
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      } else {
        updateTranslationPlaceholder();
      }
    }, 1000));
    window.elements.sourceLanguage.addEventListener('change', function() {
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      }
    });
    window.elements.targetLanguage.addEventListener('change', function() {
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      }
    });
  }

  function debounce(func, wait) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), wait);
    };
  }

  function translateText() {
    const sourceText = window.elements.sourceText.value.trim();
    if (!sourceText) {
      updateTranslationPlaceholder();
      return;
    }
    window.elements.targetText.innerHTML = `
      <div class="flex items-center justify-center h-full">
        <span class="loading loading-spinner loading-md text-primary"></span>
        <span class="ml-2 text-base-content/70">번역 중...</span>
      </div>
    `;
    var formData = new FormData();
    formData.append("text", sourceText);
    formData.append("translatorType", "PAPAGO");
    formData.append("sourceLang", window.elements.sourceLanguage.value);
    formData.append("targetLang", window.elements.targetLanguage.value);

    $.ajax({
      url: '/api/translate',
      type: 'POST',
      data: formData,
      processData: false,
      contentType: false,
      success: function(response) {
        window.elements.targetText.textContent = response.translatedText || '번역을 사용할 수 없습니다';
      },
      error: function(xhr, status, error) {
        console.error('Translation error:', error);
        window.elements.targetText.textContent = '오류: 번역을 완료할 수 없습니다.';
        showToast("번역 중 오류가 발생했습니다.", "negative");
      }
    });
  }

  function copyTranslatedText() {
    const text = window.elements.targetText.textContent;
    if (!text || text.includes('번역을 사용할 수 없습니다') || text.includes('오류:')) {
      showToast("복사할 번역 텍스트가 없습니다.", "warning");
      return;
    }
    navigator.clipboard.writeText(text).then(function() {
      showToast("번역 결과가 클립보드에 복사되었습니다.", "positive");
    }).catch(function() {
      // 폴백 방식
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast("번역 결과가 클립보드에 복사되었습니다.", "positive");
    });
  }

  function updateTranslationPlaceholder() {
    window.elements.targetText.innerHTML = '<span class="text-base-content/60">번역 결과가 여기에 표시됩니다...</span>';
  }

  function updateCharCount() {
    const count = window.elements.sourceText.value.length;
    window.elements.charCount.textContent = count;
  }
</script>
</body>
</html>
