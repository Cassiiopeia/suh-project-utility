<!-- src/main/resources/templates/pages/translator.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(title='번역기-SAECHAN-LAB')}"></head>
<body class="translator-page bg-base-200">
<div th:replace="~{fragments/header :: header}"></div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- 페이지 헤더 -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-base-content flex items-center gap-2">
      <i class="fa-solid fa-language text-primary"></i>
      <span th:text="#{translator.title}">SUH-AI 번역기</span>
    </h2>
  </div>

  <!-- 번역 영역 -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
    <!-- 원본 텍스트 영역 -->
    <div class="card bg-base-100 shadow-sm border border-base-300">
      <div class="card-body">
        <!-- 원본 언어 선택 -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium" th:text="#{translator.label.sourceLang}">원본 언어</span>
          </label>
          <select id="sourceLanguage" class="select w-full">
            <option value="AUTO" selected th:text="#{translator.lang.auto}">🌐 언어 감지</option>
            <option value="KO" th:text="#{translator.lang.ko}">🇰🇷 한국어</option>
            <option value="EN" th:text="#{translator.lang.en}">🇺🇸 영어</option>
            <option value="JA" th:text="#{translator.lang.ja}">🇯🇵 일본어</option>
            <option value="ZH_CN" th:text="#{translator.lang.zhCn}">🇨🇳 중국어 (간체)</option>
            <option value="ZH_TW" th:text="#{translator.lang.zhTw}">🇹🇼 중국어 (번체)</option>
            <option value="ES" th:text="#{translator.lang.es}">🇪🇸 스페인어</option>
            <option value="FR" th:text="#{translator.lang.fr}">🇫🇷 프랑스어</option>
            <option value="DE" th:text="#{translator.lang.de}">🇩🇪 독일어</option>
            <option value="RU" th:text="#{translator.lang.ru}">🇷🇺 러시아어</option>
            <option value="PT" th:text="#{translator.lang.pt}">🇵🇹 포르투갈어</option>
            <option value="IT" th:text="#{translator.lang.it}">🇮🇹 이탈리아어</option>
            <option value="VI" th:text="#{translator.lang.vi}">🇻🇳 베트남어</option>
            <option value="TH" th:text="#{translator.lang.th}">🇹🇭 태국어</option>
            <option value="ID" th:text="#{translator.lang.id}">🇮🇩 인도네시아어</option>
          </select>
        </div>

        <!-- 원본 텍스트 입력 -->
        <div class="form-control mt-4">
          <textarea
            id="sourceText"
            class="textarea h-48 resize-none"
            th:placeholder="#{translator.placeholder.input}"
            placeholder="번역할 텍스트를 입력하세요..."></textarea>
          <label class="label">
            <span class="label-text-alt text-base-content/70">
              <span id="charCount">0</span> <span th:text="#{translator.label.chars}">글자</span>
            </span>
          </label>
        </div>
      </div>
    </div>

    <!-- 번역 결과 영역 -->
    <div class="card bg-base-100 shadow-sm border border-base-300">
      <div class="card-body">
        <!-- 대상 언어 선택 -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium" th:text="#{translator.label.targetLang}">대상 언어</span>
          </label>
          <select id="targetLanguage" class="select w-full">
            <option value="KO" selected th:text="#{translator.lang.ko}">🇰🇷 한국어</option>
            <option value="EN" th:text="#{translator.lang.en}">🇺🇸 영어</option>
            <option value="JA" th:text="#{translator.lang.ja}">🇯🇵 일본어</option>
            <option value="ZH_CN" th:text="#{translator.lang.zhCn}">🇨🇳 중국어 (간체)</option>
            <option value="ZH_TW" th:text="#{translator.lang.zhTw}">🇹🇼 중국어 (번체)</option>
            <option value="ES" th:text="#{translator.lang.es}">🇪🇸 스페인어</option>
            <option value="FR" th:text="#{translator.lang.fr}">🇫🇷 프랑스어</option>
            <option value="DE" th:text="#{translator.lang.de}">🇩🇪 독일어</option>
            <option value="RU" th:text="#{translator.lang.ru}">🇷🇺 러시아어</option>
            <option value="PT" th:text="#{translator.lang.pt}">🇵🇹 포르투갈어</option>
            <option value="IT" th:text="#{translator.lang.it}">🇮🇹 이탈리아어</option>
            <option value="VI" th:text="#{translator.lang.vi}">🇻🇳 베트남어</option>
            <option value="TH" th:text="#{translator.lang.th}">🇹🇭 태국어</option>
            <option value="ID" th:text="#{translator.lang.id}">🇮🇩 인도네시아어</option>
          </select>
        </div>

        <!-- 번역 결과 -->
        <div class="form-control mt-4">
          <div id="targetText" class="bg-base-200 border border-base-300 rounded-lg p-4 h-48 overflow-y-auto text-base-content">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 버튼 영역 -->
  <div class="flex justify-center gap-4 mt-6">
    <button id="translateBtn" class="btn btn-primary">
      <i class="fa-solid fa-language"></i>
      <span th:text="#{translator.button.translate}">번역하기</span>
    </button>
    <button id="copyBtn" class="btn btn-outline">
      <i class="fa-solid fa-copy"></i>
      <span th:text="#{translator.button.copy}">복사하기</span>
    </button>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  $(document).ready(function () {
    initElements();
    setupEventHandlers();
  });

  function initElements() {
    window.elements = {
      sourceText: document.getElementById('sourceText'),
      targetText: document.getElementById('targetText'),
      translateBtn: document.getElementById('translateBtn'),
      copyBtn: document.getElementById('copyBtn'),
      sourceLanguage: document.getElementById('sourceLanguage'),
      targetLanguage: document.getElementById('targetLanguage'),
      charCount: document.getElementById('charCount')
    };
    updateTranslationPlaceholder();
  }

  function setupEventHandlers() {
    window.elements.translateBtn.addEventListener('click', translateText);
    window.elements.copyBtn.addEventListener('click', copyTranslatedText);
    window.elements.sourceText.addEventListener('input', debounce(function() {
      updateCharCount();
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      } else {
        updateTranslationPlaceholder();
      }
    }, 1000));
    window.elements.sourceLanguage.addEventListener('change', function() {
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      }
    });
    window.elements.targetLanguage.addEventListener('change', function() {
      if (window.elements.sourceText.value.trim().length > 0) {
        translateText();
      }
    });
  }

  function debounce(func, wait) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), wait);
    };
  }

  function translateText() {
    const sourceText = window.elements.sourceText.value.trim();
    if (!sourceText) {
      updateTranslationPlaceholder();
      return;
    }
    window.elements.targetText.innerHTML = `
      <div class="flex items-center justify-center h-full">
        <span class="loading loading-spinner loading-md text-primary"></span>
        <span class="ml-2 text-base-content/70">${window.MSG['translator.js.translating']}</span>
      </div>
    `;
    var formData = new FormData();
    formData.append("text", sourceText);
    formData.append("translatorType", "PAPAGO");
    formData.append("sourceLang", window.elements.sourceLanguage.value);
    formData.append("targetLang", window.elements.targetLanguage.value);

    $.ajax({
      url: '/api/translate',
      type: 'POST',
      data: formData,
      processData: false,
      contentType: false,
      success: function(response) {
        window.elements.targetText.textContent = response.translatedText || window.MSG['translator.js.unavailable'];
      },
      error: function(xhr, status, error) {
        console.error('Translation error:', error);
        window.elements.targetText.textContent = window.MSG['translator.js.errorResult'];
        showToast(window.MSG['translator.js.translateError'], "negative");
      }
    });
  }

  function copyTranslatedText() {
    const text = window.elements.targetText.textContent;
    if (!text || text.includes(window.MSG['translator.js.unavailable']) || text.includes(window.MSG['translator.js.errorPrefix'])) {
      showToast(window.MSG['translator.js.nothingToCopy'], "warning");
      return;
    }
    navigator.clipboard.writeText(text).then(function() {
      showToast(window.MSG['translator.js.copySuccess'], "positive");
    }).catch(function() {
      // 폴백 방식
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast(window.MSG['translator.js.copySuccess'], "positive");
    });
  }

  function updateTranslationPlaceholder() {
    window.elements.targetText.innerHTML = '<span class="text-base-content/60">' + window.MSG['translator.js.resultPlaceholder'] + '</span>';
  }

  function updateCharCount() {
    const count = window.elements.sourceText.value.length;
    window.elements.charCount.textContent = count;
  }
</script>
</body>
</html>
