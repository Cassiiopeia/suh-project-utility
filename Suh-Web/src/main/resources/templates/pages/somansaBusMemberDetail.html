<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(title='소만사 버스 예약 - 멤버 상세')}"></head>
<body class="somansa-bus-page bg-base-200">
<div th:replace="~{fragments/header :: header}"></div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="main-content">
  <div class="mb-6">
    <a href="/somansa/bus" class="btn btn-ghost btn-sm mb-4">
      <i class="fa-solid fa-arrow-left"></i>
      <span th:text="#{busMember.nav.backToList}">목록으로</span>
    </a>
    <h2 class="text-2xl font-bold text-base-content flex items-center gap-2">
      <i class="fa-solid fa-user text-primary"></i>
      <span th:text="#{busMember.title.memberDetail}">멤버 상세</span>
    </h2>
  </div>

  <div class="card bg-base-100 shadow-sm border border-base-300 mb-6">
    <div class="card-body">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="avatar placeholder">
            <div class="bg-primary text-primary-content rounded-full w-16">
              <span class="text-2xl" th:text="${member.displayName != null ? member.displayName.substring(0,1) : '?'}">?</span>
            </div>
          </div>
          <div>
            <h3 class="text-xl font-bold" th:text="${member.displayName ?: '이름 없음'}">홍길동</h3>
            <p class="text-base-content/60" th:text="${member.loginId}">email@somansa.com</p>
            <div class="flex gap-2 mt-2">
              <span th:if="${member.isActive}" class="badge badge-success" th:text="#{busMember.status.active}">활성</span>
              <span th:unless="${member.isActive}" class="badge badge-ghost" th:text="#{busMember.status.inactive}">비활성</span>
              <span th:if="${member.isVerified}" class="badge badge-info" th:text="#{busMember.status.verified}">인증됨</span>
              <span th:unless="${member.isVerified}" class="badge badge-warning" th:text="#{busMember.status.unverified}">미인증</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="text-sm text-base-content/60" th:text="#{busMember.label.memberActive}">멤버 활성</span>
            <input type="checkbox" class="toggle toggle-info"
                   th:checked="${member.isActive}"
                   th:data-member-id="${member.somansaBusMemberId}"
                   onchange="toggleMemberActive(this.getAttribute('data-member-id'))"/>
          </div>
          <button class="btn btn-outline btn-error btn-sm"
                  th:data-member-id="${member.somansaBusMemberId}"
                  onclick="deleteMember(this.getAttribute('data-member-id'))">
            <i class="fa-solid fa-trash"></i>
            <span th:text="#{busMember.action.delete}">삭제</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm border border-base-300 mb-6">
    <div class="card-body">
      <h3 class="text-lg font-semibold text-base-content flex items-center gap-2 mb-4">
        <i class="fa-solid fa-ticket text-primary"></i>
        <span th:text="#{busMember.section.quickReservation}">빠른 예약</span>
      </h3>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h4 class="font-medium mb-3 flex items-center gap-2">
            <i class="fa-solid fa-sun text-warning"></i> <span th:text="#{busMember.route.commute}">출근</span>
          </h4>
          <div class="space-y-2" id="commuteRoutes">
            <label th:each="route : ${routes}"
                   th:if="${route.caralias == '출근'}"
                   class="flex items-center gap-3 p-3 border border-base-300 rounded-lg cursor-pointer hover:bg-base-200 transition-colors">
              <input type="radio" name="selectedRoute"
                     th:value="${route.somansaBusRouteId}"
                     class="radio radio-primary radio-sm">
              <span th:text="${route.departureTime + ' ' + route.station + (route.busNumber != null ? ' ' + route.busNumber + '호' : '')}">
                06:55 당산역 1호
              </span>
            </label>
          </div>
        </div>

        <div>
          <h4 class="font-medium mb-3 flex items-center gap-2">
            <i class="fa-solid fa-moon text-info"></i> <span th:text="#{busMember.route.offwork}">퇴근</span>
          </h4>
          <div class="space-y-2" id="offworkRoutes">
            <label th:each="route : ${routes}"
                   th:if="${route.caralias == '퇴근'}"
                   class="flex items-center gap-3 p-3 border border-base-300 rounded-lg cursor-pointer hover:bg-base-200 transition-colors">
              <input type="radio" name="selectedRoute"
                     th:value="${route.somansaBusRouteId}"
                     class="radio radio-primary radio-sm">
              <span th:text="${route.departureTime + ' ' + route.station + (route.busNumber != null ? ' ' + route.busNumber + '호' : '')}">
                18:00 당산역 1호
              </span>
            </label>
          </div>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row items-start sm:items-end gap-4 mt-6 pt-4 border-t">
        <div class="form-control w-full sm:w-auto">
          <label class="label">
            <span class="label-text font-medium" th:text="#{busMember.label.reservationDate}">예약 날짜</span>
          </label>
          <input type="date" id="reservationDate" class="input input-bordered w-full sm:w-48">
        </div>
        <button class="btn btn-primary" onclick="executeReservation()">
          <i class="fa-solid fa-ticket"></i>
          <span th:text="#{busMember.action.reserve}">예약하기</span>
        </button>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm border border-base-300 mb-6">
    <div class="card-body">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <h3 class="text-lg font-semibold flex items-center gap-2">
            <i class="fa-solid fa-calendar text-primary"></i>
            <span th:text="#{busMember.section.autoSchedule}">자동 예약 스케줄</span>
          </h3>
          <p class="text-base-content/60 text-sm" th:text="#{busMember.section.autoScheduleDesc}">등록된 자동 예약 스케줄</p>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2">
            <span class="text-sm text-base-content/60" th:text="#{busMember.label.all}">전체</span>
            <input type="checkbox" class="toggle toggle-info" id="allScheduleToggle"
                   onchange="toggleAllSchedules(this.checked)"/>
          </div>
          <button class="btn btn-primary btn-sm" onclick="showAddScheduleModal()">
            <i class="fa-solid fa-plus"></i>
            <span th:text="#{busMember.action.addSchedule}">스케줄 추가</span>
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="table table-zebra">
          <thead>
            <tr>
              <th th:text="#{busMember.table.active}">활성</th>
              <th th:text="#{busMember.table.route}">노선</th>
              <th th:text="#{busMember.table.delete}">삭제</th>
            </tr>
          </thead>
          <tbody id="scheduleTable">
            <tr>
              <td colspan="3" class="text-center py-8">
                <span class="loading loading-spinner loading-md text-primary"></span>
                <span class="ml-2 text-base-content/60" th:text="#{busMember.loading.schedule}">스케줄 로딩 중...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm border border-base-300">
    <div class="card-body">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <h3 class="text-lg font-semibold text-base-content flex items-center gap-2">
            <i class="fa-solid fa-clock-rotate-left text-primary"></i>
            <span th:text="#{busMember.section.history}">예약 기록</span>
          </h3>
          <p class="text-base-content/60 text-sm" th:text="#{busMember.section.historyDesc}">이 멤버의 예약 기록</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="loadMemberHistory()">
          <i class="fa-solid fa-rotate"></i>
          <span th:text="#{busMember.action.refresh}">새로고침</span>
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="table table-zebra">
          <thead>
            <tr>
              <th th:text="#{busMember.table.executedAt}">실행시간</th>
              <th th:text="#{busMember.table.route}">노선</th>
              <th th:text="#{busMember.table.reservationDate}">예약일</th>
              <th th:text="#{busMember.table.status}">상태</th>
              <th th:text="#{busMember.table.message}">메시지</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr>
              <td colspan="5" class="text-center py-8">
                <span class="loading loading-spinner loading-md text-primary"></span>
                <span class="ml-2 text-base-content/60" th:text="#{busMember.loading.history}">기록 로딩 중...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <dialog class="modal" id="scheduleModal">
    <div class="modal-box max-w-md">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </form>
      <h3 class="font-bold text-lg flex items-center gap-2 mb-6">
        <i class="fa-solid fa-calendar-plus text-primary"></i>
        <span th:text="#{busMember.action.addSchedule}">스케줄 추가</span>
      </h3>
      <form id="scheduleForm" class="space-y-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium" th:text="#{busMember.label.selectRoute}">노선 선택</span>
          </label>
          <select class="select select-bordered w-full" id="scheduleRouteId" required>
            <option value="" th:text="#{busMember.option.selectRoutePlaceholder}">노선을 선택하세요</option>
            <option th:each="route : ${routes}"
                    th:value="${route.somansaBusRouteId}"
                    th:text="${route.description}">노선</option>
          </select>
        </div>
        <p class="text-sm text-base-content/60" th:text="#{busMember.modal.autoScheduleNotice}">매일 전날 밤 자동으로 D+1 예약이 실행됩니다.</p>
      </form>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-ghost" th:text="#{busMember.action.cancel}">취소</button>
        </form>
        <button class="btn btn-primary" onclick="createSchedule()">
          <i class="fa-solid fa-plus"></i>
          <span th:text="#{busMember.action.add}">추가</span>
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
const memberId = /*[[${member.somansaBusMemberId}]]*/ '';

$(document).ready(function() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  $('#reservationDate').val(tomorrow.toISOString().split('T')[0]);

  loadMemberSchedules();
  loadMemberHistory();
});

function executeReservation() {
  const routeId = $('input[name="selectedRoute"]:checked').val();
  const reservationDate = $('#reservationDate').val();

  if (!routeId) {
    showToast(window.MSG['busMember.toast.selectRoute'], 'negative');
    return;
  }

  if (!reservationDate) {
    showToast(window.MSG['busMember.toast.selectReservationDate'], 'negative');
    return;
  }

  sendFormRequest('/api/somansa-bus/reserve/manual', {
    somansaBusMemberId: memberId,
    somansaBusRouteId: routeId,
    reservationDate: reservationDate
  },
  function(response) {
    if (response.isReservationSuccess) {
      showToast(window.MSG['busMember.toast.reserveSuccess'], 'positive');
    } else {
      showToast(window.MSG['busMember.toast.reserveFail'], 'negative');
    }
    loadMemberHistory();
  },
  function(xhr) {
    let errorMessage = window.MSG['busMember.toast.reserveError'];
    if (xhr.responseJSON && xhr.responseJSON.message) {
      errorMessage = xhr.responseJSON.message;
    }
    showToast(errorMessage, 'negative');
  });
}

function loadMemberSchedules() {
  sendFormRequest('/api/somansa-bus/schedule/list/by-member', { somansaBusMemberId: memberId },
    function(response) {
      displaySchedules(response.schedules || []);
    },
    function(xhr) {
      // 전역 핸들러가 toast를 표시하므로 여기서는 UI 업데이트만
      $('#scheduleTable').html('<tr><td colspan="3" class="text-center py-8 text-base-content/60">' + window.MSG['busMember.toast.scheduleLoadFail'] + '</td></tr>');
    }
  );
}

function displaySchedules(schedules) {
  const tableBody = $('#scheduleTable');

  if (!schedules || schedules.length === 0) {
    tableBody.html('<tr><td colspan="3" class="text-center py-8 text-base-content/60">' + window.MSG['busMember.empty.schedule'] + '</td></tr>');
    updateAllScheduleToggle(schedules);
    return;
  }

  tableBody.empty();
  schedules.forEach(function(schedule) {
    const row = $('<tr>');

    const toggleCell = $('<td>');
    toggleCell.html(`<input type="checkbox" class="toggle toggle-info toggle-sm" ${schedule.isActive ? 'checked' : ''} onchange="toggleScheduleActive('${schedule.somansaBusScheduleId}')">`);
    row.append(toggleCell);

    const routeCell = $('<td>');
    routeCell.text(schedule.somansaBusRoute ? schedule.somansaBusRoute.description : '-');
    if (!schedule.isActive) routeCell.addClass('text-base-content/40');
    row.append(routeCell);

    const deleteCell = $('<td>');
    deleteCell.html(`<button class="btn btn-outline btn-error btn-xs" onclick="deleteSchedule('${schedule.somansaBusScheduleId}')"><i class="fa-solid fa-trash"></i></button>`);
    row.append(deleteCell);

    tableBody.append(row);
  });

  updateAllScheduleToggle(schedules);
}

function updateAllScheduleToggle(schedules) {
  const allActive = schedules && schedules.length > 0 && schedules.every(s => s.isActive);
  $('#allScheduleToggle').prop('checked', allActive);
}

function toggleAllSchedules(checked) {
  const rows = $('#scheduleTable tr');
  rows.find('input[type="checkbox"]').each(function() {
    const isCurrentlyChecked = $(this).is(':checked');
    if (isCurrentlyChecked !== checked) {
      const onclick = $(this).attr('onchange');
      const scheduleId = onclick.match(/'([^']+)'/)?.[1];
      if (scheduleId) toggleScheduleActive(scheduleId);
    }
  });
}

function showAddScheduleModal() {
  $('#scheduleForm')[0].reset();
  document.getElementById('scheduleModal').showModal();
}

function createSchedule() {
  const routeId = $('#scheduleRouteId').val();

  if (!routeId) {
    showToast(window.MSG['busMember.toast.selectRoute'], 'negative');
    return;
  }

  sendFormRequest('/api/somansa-bus/schedule/create', { somansaBusMemberId: memberId, somansaBusRouteId: routeId },
  function(response) {
    showToast(window.MSG['busMember.toast.scheduleAdded'], 'positive');
    document.getElementById('scheduleModal').close();
    loadMemberSchedules();
  },
  function(xhr) {
    showToast(window.MSG['busMember.toast.scheduleAddError'], 'negative');
  });
}

function toggleScheduleActive(scheduleId) {
  sendFormRequest('/api/somansa-bus/schedule/toggle-active', { somansaBusScheduleId: scheduleId },
    function(response) {
      showToast(window.MSG['busMember.toast.scheduleStatusChanged'], 'positive');
      loadMemberSchedules();
    },
    function(xhr) {
      showToast(window.MSG['busMember.toast.statusChangeError'], 'negative');
    }
  );
}

function deleteSchedule(scheduleId) {
  if (!confirm(window.MSG['busMember.confirm.deleteSchedule'])) {
    return;
  }

  sendFormRequest('/api/somansa-bus/schedule/delete', { somansaBusScheduleId: scheduleId },
    function(response) {
      showToast(window.MSG['busMember.toast.scheduleDeleted'], 'positive');
      loadMemberSchedules();
    },
    function(xhr) {
      showToast(window.MSG['busMember.toast.scheduleDeleteError'], 'negative');
    }
  );
}

function loadMemberHistory() {
  sendFormRequest('/api/somansa-bus/history/list/by-member', { somansaBusMemberId: memberId },
    function(response) {
      displayHistory(response.histories || []);
    },
    function(xhr) {
      // 전역 핸들러가 toast를 표시하므로 여기서는 UI 업데이트만
      $('#historyTable').html('<tr><td colspan="5" class="text-center py-8 text-base-content/60">' + window.MSG['busMember.toast.historyLoadFail'] + '</td></tr>');
    }
  );
}

function displayHistory(histories) {
  const tableBody = $('#historyTable');

  if (!histories || histories.length === 0) {
    tableBody.html('<tr><td colspan="5" class="text-center py-8 text-base-content/60">' + window.MSG['busMember.empty.history'] + '</td></tr>');
    return;
  }

  tableBody.empty();
  histories.forEach(function(history) {
    const row = $('<tr>');

    const timeCell = $('<td>');
    timeCell.text(history.executedAt ? new Date(history.executedAt).toLocaleString('ko-KR') : '-');
    row.append(timeCell);

    const routeCell = $('<td>');
    routeCell.text(history.somansaBusRoute ? history.somansaBusRoute.description : '-');
    row.append(routeCell);

    const dateCell = $('<td>');
    dateCell.text(history.reservationDate || '-');
    row.append(dateCell);

    const statusCell = $('<td>');
    if (history.isSuccess) {
      statusCell.html('<span class="badge badge-success badge-sm">' + window.MSG['busMember.history.success'] + '</span>');
    } else {
      statusCell.html('<span class="badge badge-error badge-sm">' + window.MSG['busMember.history.fail'] + '</span>');
    }
    row.append(statusCell);

    const msgCell = $('<td class="text-sm text-base-content/60">');
    msgCell.text(history.errorMessage || '-');
    row.append(msgCell);

    tableBody.append(row);
  });
}

function toggleMemberActive(memberId) {
  sendFormRequest('/api/somansa-bus/member/toggle-active', { somansaBusMemberId: memberId },
    function(response) {
      showToast(window.MSG['busMember.toast.memberStatusChanged'], 'positive');
      location.reload();
    },
    function(xhr) {
      showToast(window.MSG['busMember.toast.statusChangeError'], 'negative');
    }
  );
}

function deleteMember(memberId) {
  if (!confirm(window.MSG['busMember.confirm.deleteMember'])) {
    return;
  }

  sendFormRequest('/api/somansa-bus/member/delete', { somansaBusMemberId: memberId },
    function(response) {
      showToast(window.MSG['busMember.toast.memberDeleted'], 'positive');
      location.href = '/somansa/bus';
    },
    function(xhr) {
      showToast(window.MSG['busMember.toast.memberDeleteError'], 'negative');
    }
  );
}
</script>
</body>
</html>
