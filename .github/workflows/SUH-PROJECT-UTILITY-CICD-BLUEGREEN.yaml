name: SUH-PROJECT-UTILITY-CICD-BLUEGREEN

# ===================================================================
# Blue-Green 무중단 배포 워크플로우 (Traefik 라벨 기반)
#
# 동작 흐름:
#  1. 최신 이미지 Pull
#  2. 현재 active 컨테이너 색(blue/green) 판별 → 반대 색으로 new 결정
#  3. 새 컨테이너 기동 (Traefik 라벨 + healthcheck 포함, selenium-chrome-network 추가 연결)
#  4. 헬스체크 (최대 120초). 실패 시 new 만 삭제, old 유지 → 자동 롤백
#  5. 10초 in-flight 처리 후 old 컨테이너 제거
#
# 전제:
#  - Traefik 컨테이너가 traefik-network 에 가동 중, web entrypoint=:8079
#  - Synology 역방향 프록시 lab.suhsaechan.kr:443 → localhost:8079 설정 완료
#  - 기존 suh-project-utility (8090) 컨테이너 제거 완료
#
# 트리거 정책 (점진 전환):
#  - Phase A (현재, 검증 단계): workflow_dispatch 만 — 수동 발동으로 검증
#  - Phase B (검증 완료 후): push: branches: [main] 추가
#                              + 기존 SUH-PROJECT-UTILITY-CICD.yaml 의 push 트리거 제거
# ===================================================================

on:
  workflow_dispatch:
  # Phase B 진입 시 아래 주석 해제:
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create application.yml from secret
        run: |
          mkdir -p Suh-Web/src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > Suh-Web/src/main/resources/application.yml

      - name: Build with Gradle
        run: ./gradlew clean build -x test -Dspring.profiles.active=prod

      - name: Docker setup
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/suh-project-utility-container:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Blue-Green 무중단 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2022
          command_timeout: 10m
          script: |
            set -e

            export PATH=$PATH:/usr/local/bin
            export PW="${{ secrets.SERVER_PASSWORD }}"

            PROJECT_NAME="suh-project-utility"
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-container:${{ github.ref_name }}"
            DOMAIN="lab.suhsaechan.kr"
            INTERNAL_PORT="8080"
            TRAEFIK_NETWORK="traefik-network"
            SELENIUM_NETWORK="selenium-chrome-network"
            ROUTER_NAME="${PROJECT_NAME}"
            HEALTH_PATH="/actuator/health"
            LOG_PATTERN="Started .* in [0-9.]+ seconds"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Blue-Green 무중단 배포 시작"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 프로젝트: ${PROJECT_NAME}"
            echo "🌐 도메인: ${DOMAIN}"
            echo "🖼️ 이미지: ${IMAGE}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # 1. 최신 이미지 Pull
            echo "📥 이미지 Pull"
            echo $PW | sudo -S docker pull "${IMAGE}"

            # 2. 현재 active 컨테이너 판별 (Traefik 라벨 부착된 쪽)
            ACTIVE=$(echo $PW | sudo -S docker ps \
              --filter "label=traefik.http.routers.${ROUTER_NAME}.rule" \
              --filter "name=${PROJECT_NAME}-" \
              --format "{{.Names}}" | head -1 || echo "")

            if [ "$ACTIVE" = "${PROJECT_NAME}-blue" ]; then
              NEW_COLOR="green"
              OLD_COLOR="blue"
            elif [ "$ACTIVE" = "${PROJECT_NAME}-green" ]; then
              NEW_COLOR="blue"
              OLD_COLOR="green"
            else
              NEW_COLOR="blue"
              OLD_COLOR="green"
            fi

            NEW_NAME="${PROJECT_NAME}-${NEW_COLOR}"
            OLD_NAME="${PROJECT_NAME}-${OLD_COLOR}"

            echo "🎨 active=${ACTIVE:-none} → new=${NEW_NAME}, old=${OLD_NAME}"

            # 3. 기존 동명 (idle 쪽) 컨테이너 정리 — 이전 실패 잔존물 제거
            echo "🗑️ idle 슬롯 정리: ${NEW_NAME}"
            echo $PW | sudo -S docker rm -f "${NEW_NAME}" 2>/dev/null || true

            # 4. 새 컨테이너 기동 — Traefik 라벨 + healthcheck 라벨 포함
            #    Traefik healthcheck 통과 전엔 트래픽 안 보냄 → 502 방지
            echo "🐳 새 컨테이너 기동: ${NEW_NAME}"
            echo $PW | sudo -S docker run -d \
              --name "${NEW_NAME}" \
              --network "${TRAEFIK_NETWORK}" \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.${ROUTER_NAME}.rule=Host(\`${DOMAIN}\`)" \
              --label "traefik.http.routers.${ROUTER_NAME}.entrypoints=web" \
              --label "traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=${INTERNAL_PORT}" \
              --label "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.path=${HEALTH_PATH}" \
              --label "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.interval=5s" \
              --label "traefik.http.services.${ROUTER_NAME}.loadbalancer.healthcheck.timeout=3s" \
              -e TZ=Asia/Seoul \
              -e SPRING_PROFILES_ACTIVE=prod \
              -v /etc/localtime:/etc/localtime:ro \
              -v /volume1/projects/suh-project-utility:/mnt/suh-project-utility \
              -v /volume1/web/suh-project-utility/upload:/app/uploads \
              "${IMAGE}"

            # 4-b. selenium-chrome-network 추가 연결 (Selenium WebDriver 사용)
            echo "🔗 selenium-chrome-network 추가 연결"
            echo $PW | sudo -S docker network connect "${SELENIUM_NETWORK}" "${NEW_NAME}" 2>/dev/null || true

            # 5. 단순 대기 (디버깅 모드 — 헬스체크 주석 처리, 60초 대기 후 통과)
            #    TODO: /actuator/health 응답 확인 안 됨 → 추후 원인 파악 후 헬스체크 재활성화
            echo "⏳ 60초 대기 (Spring Boot 기동 시간 확보)"
            sleep 60
            STATUS=$(echo $PW | sudo -S docker inspect --format='{{.State.Status}}' "${NEW_NAME}" 2>/dev/null || echo "not_found")
            echo "📦 ${NEW_NAME} status=${STATUS}"

            if [ "$STATUS" != "running" ]; then
              echo "❌ 컨테이너 비정상 상태 (${STATUS}). 로그 200줄:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo $PW | sudo -S docker logs --tail 200 "${NEW_NAME}"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "ℹ️ 컨테이너 ${NEW_NAME} 유지 — 수동 검증/디버깅 모드"
              echo "ℹ️ old=${OLD_NAME} 존재 시 그대로 유지"
              exit 1
            fi

            # 6. 기존 컨테이너 정리 안 함 (디버깅 모드)
            #    blue/green 동시 공존하여 사용자가 직접 어느 쪽 응답하는지 확인 가능
            echo "ℹ️ 디버깅 모드 — old=${OLD_NAME} 존재 시 자동 정리 안 함"
            echo "ℹ️ 수동 정리 필요 시: sudo docker rm -f ${OLD_NAME}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ 새 컨테이너 ${NEW_NAME} 기동 완료 (헬스체크 생략, 디버깅 모드)"
            echo "🌐 사용자가 직접 https://lab.suhsaechan.kr 또는 Traefik dashboard 로 확인"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "📋 최근 200줄 로그:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo $PW | sudo -S docker logs --tail 200 "${NEW_NAME}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
